<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    background:#090b1d;
}

.gallery-slider{
    position:relative;
    overflow:hidden;
    height:420px;
}

.gallery-track{
    display:flex;
    width:300%;
    height:100%;
    transition:transform .6s ease;
}

.gallery-slide{
    width:33.333%;
    flex-shrink:0;
}

.gallery-slide img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.gallery-dots{
    position:absolute;
    bottom:12px;
    left:0;
    right:0;
    display:flex;
    justify-content:center;
    gap:8px;
}

.gallery-dot{
    width:24px;
    height:4px;
    border:none;
    border-radius:999px;
    background:#666;
}

.gallery-dot.active{
    background:#00f0ff;
}
</style>

</head>
<body>

<div class="gallery-slider">
    <div class="gallery-track">
       <div class="gallery-slide"><img src="gallery/1.jpeg"></div>
<div class="gallery-slide"><img src="gallery/2.jpeg"></div>
<div class="gallery-slide"><img src="gallery/4.jpeg"></div>
<div class="gallery-slide"><img src="gallery/5.jpeg"></div>
<div class="gallery-slide"><img src="gallery/6.jpeg"></div>
<div class="gallery-slide"><img src="gallery/7.jpeg"></div>
<div class="gallery-slide"><img src="gallery/8.jpeg"></div>
<div class="gallery-slide"><img src="gallery/9.jpeg"></div>
<div class="gallery-slide"><img src="gallery/10.jpeg"></div>
    </div>

    <div class="gallery-dots">
        <button class="gallery-dot active"></button>
        <button class="gallery-dot"></button>
        <button class="gallery-dot"></button>
<button class="gallery-dot"></button>
<button class="gallery-dot"></button>
<button class="gallery-dot"></button>
<button class="gallery-dot"></button>
<button class="gallery-dot"></button>
<button class="gallery-dot"></button>
    </div>
</div>

<script>
const track=document.querySelector(".gallery-track");
const dots=document.querySelectorAll(".gallery-dot");

let active=0;

function show(i){
    active=i;
    track.style.transform=`translateX(-${i*33.333}%)`;

    dots.forEach((d,index)=>{
        d.classList.toggle("active",index===i);
    });
}

dots.forEach((d,i)=>d.onclick=()=>show(i));

setInterval(()=>{
    show((active+1)%dots.length);
},3000);
</script>

</body>
</html>
